name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # smoke.sh creates its own fake `claude` + clipboard stubs, so no secrets/CLIs needed.
      - name: Smoke tests
        run: bash scripts/smoke.sh
